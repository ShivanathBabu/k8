apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  labels:
    purpose: deployment-demo 
    project: roboshop
spec:
  replicas: {{ .Values.deployment.replicas}}
  selector:
    matchLabels:
      purpose: deployment-demo 
      project: roboshop
  template:
    metadata:
      labels:
        purpose: deployment-demo 
        project: roboshop
    spec:
      containers:
      - name: nginx
        image: nginx:{{ .Values.deployment.imageVersion }}
    