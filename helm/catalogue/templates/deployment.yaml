apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  labels:
    purpose: deployment-demo 
    project: roboshop
  spec:
    replicas: {{ .values.deployment.replicas}}
    selector:
      matchLabels:
        purpose: deployment-demo 
        project: roboshop
    template:
      metadata:
        labels:
          purpose: deployment-demo 
          project: roboshop
      spec:
        containers:
        - name: nginx
          image: nginx:{{ .values.deployment.imageVersion }}
    